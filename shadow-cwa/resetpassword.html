<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password · SHADOW</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      max-width: 400px;
      width: 90%;
      background: #1d1313;
      padding: 2rem;
      border-radius: 2rem;
      border: 1px solid #351616;
      box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.6);
    }
    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }
    .logo-icon {
      background: #c62020;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #0b0b0b;
      box-shadow: 0 0 15px #c6202066;
    }
    .logo-text {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(145deg, #f5e6e6, #d4a0a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-text span {
      font-weight: 300;
      -webkit-text-fill-color: #8b3f3f;
      font-size: 1.5rem;
    }
    h2 {
      color: #f0e0e0;
      margin-bottom: 0.5rem;
      font-size: 1.2rem;
    }
    p {
      color: #b58383;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 1rem;
    }
    .input-group label {
      display: block;
      color: #b17a7a;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }
    input {
      width: 100%;
      background: #0e0808;
      border: 1px solid #3a1c1c;
      padding: 0.8rem 1rem;
      border-radius: 16px;
      color: #f0e0e0;
      font-weight: 500;
      font-size: 0.95rem;
      transition: 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #c62828;
      box-shadow: 0 0 0 3px #c6282833;
      background: #130b0b;
    }
    button {
      width: 100%;
      background: #c62828;
      border: none;
      color: #0b0b0b;
      font-weight: 700;
      padding: 0.8rem;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 0 #7a1818, 0 6px 12px #00000055;
      border: 1px solid #d94444;
      margin-top: 0.5rem;
    }
    button:hover {
      background: #d93a3a;
      transform: scale(1.02);
      box-shadow: 0 6px 0 #7a1818, 0 10px 20px #00000077;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #7a1818;
    }
    .message {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
      min-height: 1.5rem;
    }
    .back-link {
      text-align: center;
      margin-top: 1rem;
    }
    .back-link a {
      color: #8b5e5e;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-link a:hover {
      color: #dbb0b0;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-crown"></i></div>
      <div class="logo-text">SHADOW<span>.</span></div>
    </div>
    <h2><i class="fas fa-key" style="color:#c62828;"></i> Reset Password</h2>
    <p>Enter your new password below.</p>
    
    <div class="input-group">
      <label><i class="fas fa-lock"></i> New Password</label>
      <input type="password" id="newPassword" placeholder="Min 6 characters" />
    </div>
    <div class="input-group">
      <label><i class="fas fa-check"></i> Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm new password" />
    </div>
    
    <button id="resetBtn"><i class="fas fa-check"></i> Update Password</button>
    <div class="message" id="message"></div>
    <div class="back-link">
      <a href="/"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://mmbfyniruhwmafvclcre.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tYmZ5bmlydWh3bWFmdmNsY3JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTUyNzgsImV4cCI6MjA5ODEzMTI3OH0.xycktRYX8vN-rYydLjLRSDzo_3TKhYUUQS_jGn5FiYU';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        autoRefreshToken: true,
        persistSession: true,
        detectSessionInUrl: true
      }
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const message = document.getElementById('message');

      if (!newPassword || !confirmPassword) {
        message.textContent = '❌ Please fill in both fields.';
        message.style.color = '#e06666';
        return;
      }

      if (newPassword.length < 6) {
        message.textContent = '❌ Password must be at least 6 characters.';
        message.style.color = '#e06666';
        return;
      }

      if (newPassword !== confirmPassword) {
        message.textContent = '❌ Passwords do not match.';
        message.style.color = '#e06666';
        return;
      }

      message.textContent = 'Updating password...';
      message.style.color = '#b58383';

      try {
        const { error } = await supabase.auth.updateUser({
          password: newPassword
        });

        if (error) throw error;

        message.textContent = '✅ Password updated successfully! Redirecting...';
        message.style.color = '#6f9e6f';
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      } catch (error) {
        console.error('Reset error:', error);
        message.textContent = '❌ Error updating password. Please try again.';
        message.style.color = '#e06666';
      }
    });

    document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('resetBtn').click();
      }
    });
    document.getElementById('newPassword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('resetBtn').click();
      }
    });
  </script>
</body>
</html>
