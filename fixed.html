<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHADOW · CWA Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
      background-image: radial-gradient(circle at 20% 30%, #1a0a0a 0%, #0b0b0b 80%);
    }

    .app-wrapper {
      max-width: 1100px;
      width: 100%;
      background: #141010;
      border-radius: 3rem 3rem 2.5rem 2.5rem;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.9), 0 0 0 1px #3a1a1a inset;
      padding: 2.5rem 2.8rem;
      border: 1px solid #2f1818;
      transition: all 0.3s;
    }

    #signinPage { display: block; }
    #signinPage.hidden { display: none; }
    #mainApp.hidden { display: none; }

    .signin-container {
      max-width: 420px;
      margin: 1rem auto 2rem;
      padding: 2.5rem 2rem;
      background: #1d1313;
      border-radius: 2.5rem;
      border: 1px solid #351616;
      box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.6);
    }

    .signin-container .logo-area {
      justify-content: center;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .signin-container .logo-area .logo-text {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(145deg, #f5e6e6, #d4a0a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 10px #b31b1b33;
    }

    .signin-container .logo-area .logo-text span {
      font-weight: 300;
      background: none;
      -webkit-text-fill-color: #8b3f3f;
      font-size: 1.8rem;
    }

    .logo-icon {
      background: #c62020;
      width: 48px;
      height: 48px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #0b0b0b;
      box-shadow: 0 0 15px #c6202066;
    }

    .signin-title {
      color: #c28686;
      text-align: center;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1.8rem;
    }

    .signin-group {
      margin-bottom: 1.2rem;
      position: relative;
    }

    .signin-group label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b17a7a;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .signin-group input {
      width: 100%;
      background: #0e0808;
      border: 1px solid #3a1c1c;
      padding: 0.9rem 1.2rem;
      border-radius: 16px;
      color: #f0e0e0;
      font-weight: 500;
      font-size: 1rem;
      transition: 0.2s;
    }

    .signin-group input:focus {
      outline: none;
      border-color: #c62828;
      box-shadow: 0 0 0 3px #c6282833;
      background: #130b0b;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 3rem;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #8b5e5e;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.3rem;
      transition: 0.2s;
    }

    .toggle-password:hover {
      color: #dbb0b0;
    }

    .attempts-display {
      text-align: right;
      color: #8b5e5e;
      font-size: 0.75rem;
      margin-top: 0.3rem;
    }

    .attempts-display.warning {
      color: #e06666;
    }

    .btn-signin {
      width: 100%;
      background: #c62828;
      border: none;
      color: #0b0b0b;
      font-weight: 700;
      padding: 0.9rem;
      border-radius: 40px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 0 #7a1818, 0 6px 12px #00000055;
      border: 1px solid #d94444;
      margin-top: 0.5rem;
    }

    .btn-signin:hover {
      background: #d93a3a;
      transform: scale(1.02);
      box-shadow: 0 6px 0 #7a1818, 0 10px 20px #00000077;
    }

    .btn-signin:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #7a1818;
    }

    .btn-signin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-signin:disabled:hover {
      background: #c62828;
      transform: none;
      box-shadow: 0 6px 0 #7a1818, 0 6px 12px #00000055;
    }

    .signin-error {
      color: #e06666;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 0.8rem;
      min-height: 1.5rem;
    }

    .signin-footer {
      text-align: center;
      color: #6b4a4a;
      font-size: 0.8rem;
      margin-top: 1.2rem;
    }

    .signin-footer a {
      color: #c62828;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .signin-footer a:hover {
      text-decoration: underline;
    }

    .signin-mode-toggle {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .signin-mode-toggle button {
      background: transparent;
      border: 2px solid #2d1717;
      color: #8b5e5e;
      padding: 0.5rem 2rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .signin-mode-toggle button.active {
      border-color: #c62828;
      color: #f0e0e0;
      background: #1f0d0d;
    }

    .signin-mode-toggle button:hover {
      border-color: #c62828;
      color: #dbb0b0;
    }

    .shadow-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #2b1313;
      padding-bottom: 1.2rem;
      margin-bottom: 2.2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo-text {
      font-size: 2.3rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(145deg, #f5e6e6, #d4a0a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 10px #b31b1b33;
    }

    .logo-text span {
      font-weight: 300;
      background: none;
      -webkit-text-fill-color: #8b3f3f;
      font-size: 1.8rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-info {
      color: #b58383;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .user-info i {
      color: #c62828;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid #3d1c1c;
      color: #9f6f6f;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.15s;
      font-size: 0.8rem;
    }

    .btn-logout:hover {
      background: #1f0e0e;
      border-color: #6f2e2e;
      color: #dbb0b0;
    }

    .semester-selector {
      background: #1d1313;
      border-radius: 2rem;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid #351616;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.5rem;
    }

    .semester-selector label {
      color: #b17a7a;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .semester-selector select {
      background: #0e0808;
      border: 1px solid #3a1c1c;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      color: #f0e0e0;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      min-width: 200px;
    }

    .semester-selector select:focus {
      outline: none;
      border-color: #c62828;
      box-shadow: 0 0 0 3px #c6282833;
    }

    .semester-status {
      color: #8b5e5e;
      font-size: 0.85rem;
      margin-left: auto;
    }

    .btn-add-semester {
      background: transparent;
      border: 1px solid #3a1c1c;
      color: #b58383;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
    }

    .btn-add-semester:hover {
      background: #1f0e0e;
      border-color: #c62828;
      color: #f0e0e0;
    }

    .input-section {
      background: #1d1313;
      border-radius: 2rem;
      padding: 1.8rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid #351616;
      box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.6);
    }

    .input-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 0.7fr;
      gap: 0.8rem;
      align-items: end;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .input-group label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b17a7a;
      font-weight: 600;
    }

    .input-group input {
      background: #0e0808;
      border: 1px solid #3a1c1c;
      padding: 0.8rem 0.9rem;
      border-radius: 16px;
      color: #f0e0e0;
      font-weight: 500;
      font-size: 0.95rem;
      transition: 0.2s;
      width: 100%;
    }

    .input-group input:focus {
      outline: none;
      border-color: #c62828;
      box-shadow: 0 0 0 3px #c6282833;
      background: #130b0b;
    }

    .btn-add {
      background: #c62828;
      border: none;
      color: #0b0b0b;
      font-weight: 700;
      padding: 0.8rem 1.8rem;
      border-radius: 40px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 0 #7a1818, 0 6px 12px #00000055;
      border: 1px solid #d94444;
      height: 48px;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #d93a3a;
      transform: scale(1.02);
      box-shadow: 0 6px 0 #7a1818, 0 10px 20px #00000077;
    }

    .btn-add:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #7a1818;
    }

    .table-wrapper {
      background: #0f0b0b;
      border-radius: 2rem;
      padding: 0.2rem;
      border: 1px solid #2d1515;
      margin-bottom: 2rem;
      overflow-x: auto;
    }

    .course-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      min-width: 580px;
    }

    .course-table th {
      text-align: left;
      padding: 1rem 1.2rem;
      background: #1f1111;
      color: #c28686;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #321919;
    }

    .course-table td {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid #221010;
      color: #e6d4d4;
    }

    .course-table tr:last-child td {
      border-bottom: none;
    }

    .course-table tr:hover td {
      background: #1f1212;
    }

    .empty-row td {
      color: #553b3b;
      text-align: center;
      padding: 2.5rem 1.2rem;
      font-style: italic;
      font-size: 0.95rem;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #a54848;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.15s;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
    }

    .btn-delete:hover {
      color: #e06666;
      background: #2b1212;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem 1.5rem;
      margin-top: 0.8rem;
      margin-bottom: 2.2rem;
    }

    .btn-calc {
      background: #b71c1c;
      border: none;
      color: #0b0b0b;
      font-weight: 700;
      padding: 0.9rem 3rem;
      border-radius: 60px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
      box-shadow: 0 6px 0 #6f1414, 0 8px 20px #00000080;
      transition: 0.15s;
      border: 1px solid #d94444;
    }

    .btn-calc:hover {
      background: #d63a3a;
      transform: scale(1.02);
    }

    .btn-calc:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #6f1414;
    }

    .btn-clear-all {
      background: transparent;
      border: 1px solid #3d1c1c;
      color: #9f6f6f;
      padding: 0.6rem 1.8rem;
      border-radius: 60px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      font-size: 0.9rem;
    }

    .btn-clear-all:hover {
      background: #1f0e0e;
      border-color: #6f2e2e;
      color: #dbb0b0;
    }

    .results-panel {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.2rem;
      margin-top: 0.5rem;
    }

    .result-card {
      background: #170e0e;
      border-radius: 1.8rem;
      padding: 1.6rem 1.2rem;
      border: 1px solid #321818;
      text-align: center;
      transition: 0.2s;
    }

    .result-card.highlight {
      border-color: #b71c1c;
      background: #1f0d0d;
      box-shadow: 0 0 25px #b71c1c22;
    }

    .result-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b5e5e;
      font-weight: 600;
    }

    .result-value {
      font-size: 2.4rem;
      font-weight: 700;
      color: #f0e0e0;
      margin: 0.5rem 0 0.2rem;
      letter-spacing: -0.5px;
    }

    .result-value .percent {
      font-size: 1.2rem;
      color: #8f5a5a;
      font-weight: 400;
    }

    .result-sub {
      font-size: 0.9rem;
      color: #b58383;
      font-weight: 500;
    }

    .result-card .class-badge {
      display: inline-block;
      background: #b71c1c;
      color: #0b0b0b;
      padding: 0.2rem 1.2rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-top: 0.3rem;
      box-shadow: 0 2px 10px #b71c1c44;
    }

    .semester-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem 1.2rem;
      margin-top: 0.5rem;
    }

    .sem-item {
      background: #110a0a;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      border: 1px solid #2d1717;
      font-size: 0.85rem;
      color: #dbb0b0;
    }

    .sem-item strong {
      color: #f0d4d4;
      font-weight: 600;
    }

    @media (max-width: 850px) {
      .app-wrapper { padding: 1.8rem 1.5rem; }
      .input-grid { grid-template-columns: 1fr 1fr; }
      .btn-add { grid-column: span 2; width: 100%; }
      .results-panel { grid-template-columns: 1fr; }
      .logo-text { font-size: 1.8rem; }
      .semester-selector { flex-direction: column; align-items: stretch; }
      .semester-status { margin-left: 0; }
    }

    @media (max-width: 480px) {
      .input-grid { grid-template-columns: 1fr; }
      .btn-add { grid-column: span 1; }
      .action-row { flex-direction: column; align-items: stretch; }
      .btn-calc { justify-content: center; }
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a0d0d; }
    ::-webkit-scrollbar-thumb { background: #4f2020; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #7a2e2e; }
  </style>
</head>
<body>

<div class="app-wrapper">
  <!-- SIGN-IN PAGE -->
  <div id="signinPage">
    <div class="signin-container">
      <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-crown"></i></div>
        <div class="logo-text">SHADOW<span>.</span></div>
      </div>
      <div class="signin-title"><i class="fas fa-user-lock"></i> Student Portal</div>
      
      <div class="signin-mode-toggle">
        <button id="loginModeBtn" class="active">Sign In</button>
        <button id="signupModeBtn">Sign Up</button>
      </div>

      <div class="signin-group">
        <label><i class="fas fa-user"></i> Student ID / Username</label>
        <input type="text" id="loginUsername" placeholder="e.g., student" value="student" />
      </div>
      <div class="signin-group">
        <label><i class="fas fa-key"></i> Password</label>
        <div class="password-wrapper">
          <input type="password" id="loginPassword" placeholder="Enter your password" value="student123" />
          <button class="toggle-password" id="togglePassword" type="button">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="attempts-display" id="attemptsDisplay">Attempts remaining: 3</div>
      </div>
      
      <button class="btn-signin" id="signinBtn"><i class="fas fa-sign-in-alt"></i> <span id="signinBtnText">Sign In</span></button>
      <div class="signin-error" id="signinError"></div>
      
      <div class="signin-footer" id="signinFooter">
        Don't have an account? <a id="showSignupLink">Create one</a>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden">
    <div class="shadow-header">
      <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-crown"></i></div>
        <div class="logo-text">SHADOW<span>.</span></div>
      </div>
      <div class="header-right">
        <div class="user-info"><i class="fas fa-user-circle"></i> <span id="currentUserDisplay">User</span></div>
        <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
      </div>
    </div>

    <div class="semester-selector">
      <label><i class="fas fa-calendar-alt"></i> Semester:</label>
      <select id="semesterSelect"></select>
      <button class="btn-add-semester" id="addSemesterBtn"><i class="fas fa-plus"></i> Add Semester</button>
      <div class="semester-status">
        <i class="fas fa-info-circle"></i> <span id="courseCountDisplay">0 courses</span>
      </div>
    </div>

    <div class="input-section">
      <div class="input-grid">
        <div class="input-group">
          <label><i class="fas fa-book-open"></i> Course code</label>
          <input type="text" id="courseCode" placeholder="e.g. MATH 101" />
        </div>
        <div class="input-group">
          <label><i class="fas fa-hourglass-half"></i> Credits</label>
          <input type="number" id="creditHours" placeholder="3" min="0" step="0.5" />
        </div>
        <div class="input-group">
          <label><i class="fas fa-percent"></i> Mark (%)</label>
          <input type="number" id="courseMark" placeholder="78" min="0" max="100" />
        </div>
        <button class="btn-add" id="addBtn"><i class="fas fa-plus-circle"></i> Add</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table class="course-table" id="courseTable">
        <thead>
          <tr>
            <th>Course</th>
            <th>Credits</th>
            <th>Mark (%)</th>
            <th style="text-align:right;">Action</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row"><td colspan="4"><i class="fas fa-database" style="margin-right:10px;"></i>No courses for this semester — add your first course.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="action-row">
      <button class="btn-calc" id="calcBtn"><i class="fas fa-calculator"></i> Calculate</button>
      <button class="btn-clear-all" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Clear all courses</button>
    </div>

    <div class="results-panel" id="resultsPanel">
      <div class="result-card highlight">
        <div class="result-label"><i class="fas fa-star"></i> CWA (cumulative)</div>
        <div class="result-value" id="cwaValue">—</div>
        <div class="result-sub" id="classDisplay">Awaiting data</div>
      </div>
      <div class="result-card">
        <div class="result-label"><i class="fas fa-chart-line"></i> Semester Averages</div>
        <div id="semesterAveragesContainer" style="margin-top:0.6rem; min-height: 3rem; color: #b58383; font-size:0.95rem;">
          <span style="color:#553b3b;">No semesters yet</span>
        </div>
      </div>
      <div class="result-card">
        <div class="result-label"><i class="fas fa-clipboard-list"></i> Total courses</div>
        <div class="result-value" id="totalCourses" style="font-size:2rem;">0</div>
        <div class="result-sub" id="totalCreditsDisplay">0 credits</div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  DATA LAYER
// ============================================================
const STORAGE_KEY = 'shadow_data';
const USERS_KEY = 'shadow_users';
const ATTEMPTS_KEY = 'shadow_attempts';

let loginAttempts = 3;

function loadAttempts() {
  const stored = localStorage.getItem(ATTEMPTS_KEY);
  if (stored) {
    loginAttempts = parseInt(stored) || 3;
  } else {
    loginAttempts = 3;
    localStorage.setItem(ATTEMPTS_KEY, '3');
  }
  updateAttemptsDisplay();
}

function saveAttempts() {
  localStorage.setItem(ATTEMPTS_KEY, loginAttempts.toString());
  updateAttemptsDisplay();
}

function updateAttemptsDisplay() {
  const display = document.getElementById('attemptsDisplay');
  if (display) {
    display.textContent = `Attempts remaining: ${loginAttempts}`;
    if (loginAttempts <= 1) {
      display.classList.add('warning');
    } else {
      display.classList.remove('warning');
    }
  }
}

function resetAttempts() {
  loginAttempts = 3;
  localStorage.setItem(ATTEMPTS_KEY, '3');
  updateAttemptsDisplay();
  const btn = document.getElementById('signinBtn');
  if (btn) btn.disabled = false;
}

function decrementAttempts() {
  loginAttempts--;
  saveAttempts();
  if (loginAttempts <= 0) {
    document.getElementById('signinBtn').disabled = true;
    document.getElementById('signinError').textContent = '❌ Too many failed attempts. Please refresh the page to try again.';
    document.getElementById('signinError').style.color = '#e06666';
  }
}

function loadUsers() {
  const stored = localStorage.getItem(USERS_KEY);
  if (stored) {
    try { return JSON.parse(stored); } catch(e) { /* ignore */ }
  }
  const defaults = { 'student': 'student123' };
  localStorage.setItem(USERS_KEY, JSON.stringify(defaults));
  return defaults;
}

function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

let currentUser = null;
let userData = { courses: [], semesters: [] };

function loadUserData(username) {
  const allData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  return allData[username] || { courses: [], semesters: [] };
}

function saveUserData(username, data) {
  const allData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  allData[username] = data;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
}

// ============================================================
//  SEMESTER HELPERS
// ============================================================
function getSemesterKey(year, semester) {
  return `Y${year}S${semester}`;
}

function parseSemesterKey(key) {
  const match = key.match(/^Y(\d+)S(\d+)$/);
  if (!match) return null;
  return { year: parseInt(match[1]), semester: parseInt(match[2]) };
}

function getSemesterLabel(year, semester) {
  return `Year ${year} · Semester ${semester}`;
}

function getAllSemesterKeys(courses) {
  const keys = new Set();
  courses.forEach(c => keys.add(c.semesterKey));
  return Array.from(keys).sort((a, b) => {
    const aParsed = parseSemesterKey(a);
    const bParsed = parseSemesterKey(b);
    if (!aParsed || !bParsed) return 0;
    if (aParsed.year !== bParsed.year) return aParsed.year - bParsed.year;
    return aParsed.semester - bParsed.semester;
  });
}

function getNextSemesterKey(keys) {
  if (keys.length === 0) return 'Y1S1';
  const last = parseSemesterKey(keys[keys.length - 1]);
  if (!last) return 'Y1S1';
  if (last.semester === 2) {
    return `Y${last.year + 1}S1`;
  } else {
    return `Y${last.year}S${last.semester + 1}`;
  }
}

// ============================================================
//  DOM REFS
// ============================================================
const signinPage = document.getElementById('signinPage');
const mainApp = document.getElementById('mainApp');
const loginUsername = document.getElementById('loginUsername');
const loginPassword = document.getElementById('loginPassword');
const signinBtn = document.getElementById('signinBtn');
const signinBtnText = document.getElementById('signinBtnText');
const signinError = document.getElementById('signinError');
const signinFooter = document.getElementById('signinFooter');
const showSignupLink = document.getElementById('showSignupLink');
const loginModeBtn = document.getElementById('loginModeBtn');
const signupModeBtn = document.getElementById('signupModeBtn');
const logoutBtn = document.getElementById('logoutBtn');
const currentUserDisplay = document.getElementById('currentUserDisplay');
const togglePassword = document.getElementById('togglePassword');

const semesterSelect = document.getElementById('semesterSelect');
const addSemesterBtn = document.getElementById('addSemesterBtn');
const courseCountDisplay = document.getElementById('courseCountDisplay');
const codeInput = document.getElementById('courseCode');
const creditInput = document.getElementById('creditHours');
const markInput = document.getElementById('courseMark');
const addBtn = document.getElementById('addBtn');
const tableBody = document.getElementById('tableBody');
const calcBtn = document.getElementById('calcBtn');
const clearAllBtn = document.getElementById('clearAllBtn');
const cwaValue = document.getElementById('cwaValue');
const classDisplay = document.getElementById('classDisplay');
const semesterAveragesContainer = document.getElementById('semesterAveragesContainer');
const totalCourses = document.getElementById('totalCourses');
const totalCreditsDisplay = document.getElementById('totalCreditsDisplay');

let currentSemesterKey = 'Y1S1';
let isSignupMode = false;

// ============================================================
//  PASSWORD TOGGLE
// ============================================================
togglePassword.addEventListener('click', function() {
  const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
  loginPassword.setAttribute('type', type);
  this.querySelector('i').classList.toggle('fa-eye');
  this.querySelector('i').classList.toggle('fa-eye-slash');
});

// ============================================================
//  AUTH FUNCTIONS
// ============================================================
function handleAuth() {
  if (loginAttempts <= 0) {
    signinError.textContent = '❌ Too many failed attempts. Please refresh the page.';
    signinError.style.color = '#e06666';
    return;
  }

  const username = loginUsername.value.trim();
  const password = loginPassword.value.trim();

  if (!username || !password) {
    signinError.textContent = 'Please enter both username and password.';
    signinError.style.color = '#e06666';
    decrementAttempts();
    return;
  }

  const users = loadUsers();

  if (isSignupMode) {
    if (users[username]) {
      signinError.textContent = '❌ Username already exists. Please choose another.';
      signinError.style.color = '#e06666';
      decrementAttempts();
      return;
    }
    users[username] = password;
    saveUsers(users);
    const allData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    allData[username] = { courses: [], semesters: ['Y1S1'] };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    
    signinError.textContent = '✅ Account created successfully! Please sign in.';
    signinError.style.color = '#6f9e6f';
    
    isSignupMode = false;
    signinBtnText.textContent = 'Sign In';
    loginModeBtn.classList.add('active');
    signupModeBtn.classList.remove('active');
    signinFooter.innerHTML = `Don't have an account? <a id="showSignupLink">Create one</a>`;
    document.getElementById('showSignupLink').addEventListener('click', switchToSignup);
    loginPassword.value = '';
    resetAttempts();
    return;
  }

  // SIGN IN
  if (users[username] && users[username] === password) {
    currentUser = username;
    userData = loadUserData(username);
    userData.courses = userData.courses || [];
    userData.semesters = userData.semesters || ['Y1S1'];
    userData.courses.forEach(c => {
      if (!c.semesterKey) {
        c.semesterKey = 'Y1S1';
      }
    });
    saveUserData(username, userData);
    showMainApp();
    signinError.textContent = '';
    signinError.style.color = '#e06666';
    resetAttempts();
  } else {
    signinError.textContent = '❌ Invalid username or password.';
    signinError.style.color = '#e06666';
    decrementAttempts();
  }
}

function switchToSignup() {
  isSignupMode = true;
  signinBtnText.textContent = 'Create Account';
  loginModeBtn.classList.remove('active');
  signupModeBtn.classList.add('active');
  signinFooter.innerHTML = `Already have an account? <a id="showLoginLink">Sign in</a>`;
  document.getElementById('showLoginLink').addEventListener('click', switchToLogin);
  signinError.textContent = '';
  signinError.style.color = '#e06666';
  resetAttempts();
}

function switchToLogin() {
  isSignupMode = false;
  signinBtnText.textContent = 'Sign In';
  loginModeBtn.classList.add('active');
  signupModeBtn.classList.remove('active');
  signinFooter.innerHTML = `Don't have an account? <a id="showSignupLink">Create one</a>`;
  document.getElementById('showSignupLink').addEventListener('click', switchToSignup);
  signinError.textContent = '';
  signinError.style.color = '#e06666';
  resetAttempts();
}

function signOut() {
  currentUser = null;
  userData = { courses: [], semesters: [] };
  showSignInPage();
}

function showSignInPage() {
  signinPage.classList.remove('hidden');
  mainApp.classList.add('hidden');
  signinError.textContent = '';
  loginPassword.value = '';
  resetAttempts();
}

function showMainApp() {
  signinPage.classList.add('hidden');
  mainApp.classList.remove('hidden');
  currentUserDisplay.textContent = currentUser;
  populateSemesterSelect();
  renderTable();
  clearResults();
}

// ============================================================
//  SEMESTER SELECTOR
// ============================================================
function populateSemesterSelect() {
  let semesters = userData.semesters || [];
  const courseSemesters = getAllSemesterKeys(userData.courses);
  courseSemesters.forEach(s => {
    if (!semesters.includes(s)) {
      semesters.push(s);
    }
  });
  
  semesters.sort((a, b) => {
    const aParsed = parseSemesterKey(a);
    const bParsed = parseSemesterKey(b);
    if (!aParsed || !bParsed) return 0;
    if (aParsed.year !== bParsed.year) return aParsed.year - bParsed.year;
    return aParsed.semester - bParsed.semester;
  });
  
  if (semesters.length === 0) {
    semesters.push('Y1S1');
  }
  
  userData.semesters = semesters;
  saveUserData(currentUser, userData);

  semesterSelect.innerHTML = '';
  semesters.forEach(key => {
    const parsed = parseSemesterKey(key);
    if (!parsed) return;
    const option = document.createElement('option');
    option.value = key;
    option.textContent = getSemesterLabel(parsed.year, parsed.semester);
    if (key === currentSemesterKey) {
      option.selected = true;
    }
    semesterSelect.appendChild(option);
  });

  if (!semesters.includes(currentSemesterKey)) {
    currentSemesterKey = semesters[0];
    semesterSelect.value = currentSemesterKey;
  }

  updateSemesterStatus();
}

function addNewSemester() {
  let semesters = userData.semesters || [];
  const courseSemesters = getAllSemesterKeys(userData.courses);
  courseSemesters.forEach(s => {
    if (!semesters.includes(s)) {
      semesters.push(s);
    }
  });
  
  semesters.sort((a, b) => {
    const aParsed = parseSemesterKey(a);
    const bParsed = parseSemesterKey(b);
    if (!aParsed || !bParsed) return 0;
    if (aParsed.year !== bParsed.year) return aParsed.year - bParsed.year;
    return aParsed.semester - bParsed.semester;
  });
  
  if (semesters.length === 0) {
    semesters.push('Y1S1');
    userData.semesters = semesters;
    saveUserData(currentUser, userData);
    currentSemesterKey = 'Y1S1';
    populateSemesterSelect();
    renderTable();
    updateSemesterStatus();
    clearResults();
    return;
  }
  
  const nextKey = getNextSemesterKey(semesters);
  const parsed = parseSemesterKey(nextKey);
  if (!parsed) return;
  
  if (semesters.includes(nextKey)) {
    alert(`${getSemesterLabel(parsed.year, parsed.semester)} already exists!`);
    return;
  }
  
  if (confirm(`Add ${getSemesterLabel(parsed.year, parsed.semester)}?`)) {
    semesters.push(nextKey);
    userData.semesters = semesters;
    saveUserData(currentUser, userData);
    currentSemesterKey = nextKey;
    populateSemesterSelect();
    renderTable();
    updateSemesterStatus();
    clearResults();
  }
}

function updateSemesterStatus() {
  const coursesInSemester = userData.courses.filter(c => c.semesterKey === currentSemesterKey);
  const parsed = parseSemesterKey(currentSemesterKey);
  const label = parsed ? getSemesterLabel(parsed.year, parsed.semester) : 'Unknown';
  courseCountDisplay.textContent = `${coursesInSemester.length} courses in ${label}`;
}

// ============================================================
//  RENDER TABLE
// ============================================================
function renderTable() {
  const coursesInSemester = userData.courses.filter(c => c.semesterKey === currentSemesterKey);

  if (coursesInSemester.length === 0) {
    tableBody.innerHTML = `<tr class="empty-row"><td colspan="4"><i class="fas fa-database" style="margin-right:10px;"></i>No courses for this semester — add your first course.</td></tr>`;
    return;
  }

  let html = '';
  coursesInSemester.forEach((c) => {
    html += `<tr>
      <td><strong>${escapeHtml(c.code)}</strong></td>
      <td>${c.credits}</td>
      <td>${c.mark}</td>
      <td style="text-align:right;">
        <button class="btn-delete" data-id="${c.id}"><i class="fas fa-times-circle"></i></button>
      </td>
    </tr>`;
  });
  tableBody.innerHTML = html;

  document.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', function() {
      const id = this.dataset.id;
      userData.courses = userData.courses.filter(c => c.id !== id);
      saveUserData(currentUser, userData);
      renderTable();
      updateSemesterStatus();
      clearResults();
    });
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================================
//  ADD COURSE
// ============================================================
function addCourse() {
  const code = codeInput.value.trim();
  const credits = parseFloat(creditInput.value);
  const mark = parseFloat(markInput.value);

  if (!code) { alert('Please enter a course code.'); return; }
  if (isNaN(credits) || credits <= 0) { alert('Enter valid credit hours (positive number).'); return; }
  if (isNaN(mark) || mark < 0 || mark > 100) { alert('Enter a mark between 0 and 100.'); return; }

  userData.courses.push({
    id: Date.now() + Math.random().toString(36).substr(2, 6),
    code: code,
    credits: credits,
    mark: mark,
    semesterKey: currentSemesterKey
  });

  saveUserData(currentUser, userData);
  codeInput.value = '';
  creditInput.value = '';
  markInput.value = '';
  codeInput.focus();

  renderTable();
  updateSemesterStatus();
  clearResults();
}

// ============================================================
//  CALCULATE
// ============================================================
function calculate() {
  if (userData.courses.length === 0) {
    alert('Add at least one course before calculating.');
    return;
  }

  let totalWeighted = 0;
  let totalCredits = 0;
  userData.courses.forEach(c => {
    totalWeighted += c.credits * c.mark;
    totalCredits += c.credits;
  });
  const cwa = totalWeighted / totalCredits;
  const cwaFixed = cwa.toFixed(2);

  let className = '';
  if (cwa >= 70.00) className = 'First Class Honours';
  else if (cwa >= 60.00) className = 'Second Class Honours (Upper)';
  else if (cwa >= 50.00) className = 'Second Class Honours (Lower)';
  else if (cwa >= 40.00) className = 'Third Class Honours';
  else className = 'Fail';

  const semesterMap = new Map();
  userData.courses.forEach(c => {
    if (!semesterMap.has(c.semesterKey)) {
      semesterMap.set(c.semesterKey, { sum: 0, count: 0 });
    }
    const entry = semesterMap.get(c.semesterKey);
    entry.sum += c.mark;
    entry.count += 1;
  });

  const sortedSemesters = Array.from(semesterMap.keys()).sort((a, b) => {
    const aParsed = parseSemesterKey(a);
    const bParsed = parseSemesterKey(b);
    if (!aParsed || !bParsed) return 0;
    if (aParsed.year !== bParsed.year) return aParsed.year - bParsed.year;
    return aParsed.semester - bParsed.semester;
  });

  let semHtml = '';
  sortedSemesters.forEach(key => {
    const data = semesterMap.get(key);
    const avg = (data.sum / data.count).toFixed(2);
    const parsed = parseSemesterKey(key);
    const label = parsed ? getSemesterLabel(parsed.year, parsed.semester) : key;
    semHtml += `<div class="sem-item"><strong>${label}</strong> ${avg}%</div>`;
  });

  cwaValue.innerHTML = `${cwaFixed} <span class="percent">%</span>`;
  classDisplay.innerHTML = `<span class="class-badge">${className}</span>`;
  semesterAveragesContainer.innerHTML = `<div class="semester-grid">${semHtml}</div>`;
  totalCourses.textContent = userData.courses.length;
  totalCreditsDisplay.textContent = totalCredits.toFixed(1) + ' credits';
}

function clearResults() {
  cwaValue.textContent = '—';
  classDisplay.textContent = 'Awaiting data';
  semesterAveragesContainer.innerHTML = `<span style="color:#553b3b;">No semesters yet</span>`;
  totalCourses.textContent = userData.courses.length;
  const totalCred = userData.courses.reduce((sum, c) => sum + c.credits, 0);
  totalCreditsDisplay.textContent = totalCred.toFixed(1) + ' credits';
}

function clearAllCourses() {
  if (userData.courses.length === 0) return;
  if (confirm('Delete ALL courses across ALL semesters?')) {
    userData.courses = [];
    saveUserData(currentUser, userData);
    renderTable();
    updateSemesterStatus();
    clearResults();
  }
}

// ============================================================
//  EVENT LISTENERS
// ============================================================
signinBtn.addEventListener('click', handleAuth);

loginModeBtn.addEventListener('click', switchToLogin);
signupModeBtn.addEventListener('click', switchToSignup);

showSignupLink.addEventListener('click', switchToSignup);

document.getElementById('loginUsername').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleAuth();
});
document.getElementById('loginPassword').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') handleAuth();
});

logoutBtn.addEventListener('click', signOut);

addBtn.addEventListener('click', addCourse);
document.querySelectorAll('.input-group input').forEach(inp => {
  inp.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addCourse();
    }
  });
});

calcBtn.addEventListener('click', calculate);
clearAllBtn.addEventListener('click', clearAllCourses);

semesterSelect.addEventListener('change', function() {
  currentSemesterKey = this.value;
  renderTable();
  updateSemesterStatus();
  clearResults();
});

addSemesterBtn.addEventListener('click', addNewSemester);

// ============================================================
//  INIT
// ============================================================
loadAttempts();
showSignInPage();
</script>
</body>
</html>
